<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Portfolio</h1>

    <div class="tabs">
        <button onclick="openTab('C1')">C1</button>
        <button onclick="openTab('C7')">C7</button>
        <button onclick="openTab('C11')">C11</button>
        <button onclick="openTab('C14')">C14</button>
        <button onclick="openTab('C17')">C17</button>
    </div>

    <div id="C1" class="tab-content">
        <iframe src="pdf/Installation Agent GLPI Linux.pdf"></iframe>
        <iframe src="pdf/Configuration GLPI.pdf"></iframe>
    </div>

    <div id="C7" class="tab-content">
        <iframe src="pdf/Reception des demandes sous forme de ticket sur glpi.pdf"></iframe>
    </div>

    <div id="C11" class="tab-content">
        <iframe src="pdf/Ajout d'un suivi des fonctionnalités à l'aide de Trello.pdf"></iframe>
    </div>

    <div id="C14" class="tab-content">
        <iframe src="pdf/Ajout d'un suivi des fonctionnalités à l'aide de Trello.pdf"></iframe>
    </div>

    <div id="C17" class="tab-content">
        <iframe src="pdf/Configuration d'un formulaire PHP à un serveur SMTP.pdf"></iframe>
        <iframe src="pdf/Mise en place d'un site et configuration d'un serveur SMTP via PHP.pdf"></iframe>
    </div>

    <script>
        function openTab(tabName) {
            let contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].style.display = "none";
            }
            document.getElementById(tabName).style.display = "block";
        }

        // Onglet par défaut
        openTab('C1');
    </script>

</body>
</html>
